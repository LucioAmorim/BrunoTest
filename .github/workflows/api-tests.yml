name: Run API Tests (Manual)

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar Bruno CLI
        run: npm install -g @usebruno/cli

      - name: 🧪 Create User
        run: bru run ./CreateUser.yml

      - name: 🧪 Login Successful
        run: bru run ./LoginSuccessfull.yml