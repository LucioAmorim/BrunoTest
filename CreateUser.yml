info:
  name: CreateUser
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/user"
  body:
    type: json
    data: |-
      {
        "id": 1001,
        "username": "lucio.amorim",
        "firstName": "Lúcio",
        "lastName": "Amorim",
        "email": "lucio.amorim@test.com",
        "password": "Senha@123",
        "phone": "+5547999999999",
        "userStatus": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
