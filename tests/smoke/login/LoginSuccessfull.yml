info:
  name: LoginSuccessfull
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseurl}}/user/login?username=lucio.amorim&password=senha@123"
  params:
    - name: username
      value: lucio.amorim
      type: query
    - name: password
      value: senha@123
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("Body code should be 200", function () {
          expect(res.body.code).to.equal(200);
        });
        test("Message should contain 'logged in user session'", function () {
          expect(res.body.message).to.contain("logged in user session");
        });
        test("Response time should be under 1000ms", function () {
          expect(res.responseTime).to.be.below(1000);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
