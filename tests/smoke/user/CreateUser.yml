
info:
  name: CreateUser
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseurl}}/user"
  body:
    type: json
    data: |-
      {
        "id": 1001,
        "username": "lucio.amorim",
        "firstName": "Lúcio",
        "lastName": "Amorim",
        "email": "lucio.amorim@test.com",
        "password": "Senha@123",
        "phone": "+5547999999999",
        "userStatus": 1
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status code should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("Body code should be 200", function () {
          expect(res.body.code).to.equal(200);
        });
        test("Message should be '1001'", function () {
          expect(res.body.message).to.equal("1001");
        });
        test("Response time should be under 1000ms", function () {
          expect(res.responseTime).to.be.below(1000);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
